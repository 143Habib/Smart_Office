<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="860" viewBox="0 0 1400 860">
  <defs>
    <style>text{font-family:Inter,Segoe UI,Arial,sans-serif;fill:#0f172a}.title{font-size:34px;font-weight:800}.small{font-size:16px}.label{font-size:18px;font-weight:700}.wire{stroke:#334155;stroke-width:4;fill:none}.signal{stroke:#2563eb;stroke-width:3;fill:none}.power{stroke:#dc2626;stroke-width:4;fill:none}.gnd{stroke:#111827;stroke-width:4;fill:none}.box{fill:#f8fafc;stroke:#0f172a;stroke-width:3;rx:20}.module{fill:#e0f2fe;stroke:#0369a1;stroke-width:3;rx:18}.load{fill:#fef3c7;stroke:#92400e;stroke-width:3;rx:16}.sensor{fill:#dcfce7;stroke:#15803d;stroke-width:3;rx:16}</style>
  </defs>
  <rect width="1400" height="860" fill="#ffffff"/>
  <text x="70" y="62" class="title">Representative Hardware / Electrical Schematic — One Room</text>
  <text x="70" y="96" class="small">Conceptual ESP32 sensing/control circuit for 2 fans and 3 lights. Use relay modules or MOSFET drivers for real loads; never drive mains loads directly from GPIO.</text>

  <rect x="110" y="170" width="260" height="500" class="box"/>
  <text x="190" y="210" class="label">ESP32</text>
  <circle cx="350" cy="270" r="8" fill="#2563eb"/><text x="145" y="276" class="small">GPIO 18 → Fan 1 Relay</text>
  <circle cx="350" cy="330" r="8" fill="#2563eb"/><text x="145" y="336" class="small">GPIO 19 → Fan 2 Relay</text>
  <circle cx="350" cy="390" r="8" fill="#2563eb"/><text x="145" y="396" class="small">GPIO 21 → Light 1 Relay</text>
  <circle cx="350" cy="450" r="8" fill="#2563eb"/><text x="145" y="456" class="small">GPIO 22 → Light 2 Relay</text>
  <circle cx="350" cy="510" r="8" fill="#2563eb"/><text x="145" y="516" class="small">GPIO 23 → Light 3 Relay</text>
  <circle cx="350" cy="585" r="8" fill="#15803d"/><text x="145" y="591" class="small">ADC 34 ← ACS712 OUT</text>

  <rect x="520" y="230" width="230" height="350" class="module"/>
  <text x="575" y="270" class="label">5-Channel Relay Board</text>
  <text x="555" y="315" class="small">IN1 Fan 1</text><text x="555" y="365" class="small">IN2 Fan 2</text><text x="555" y="415" class="small">IN3 Light 1</text><text x="555" y="465" class="small">IN4 Light 2</text><text x="555" y="515" class="small">IN5 Light 3</text>

  <rect x="890" y="130" width="170" height="75" class="load"/><text x="935" y="176" class="label">Fan 1</text>
  <rect x="890" y="245" width="170" height="75" class="load"/><text x="935" y="291" class="label">Fan 2</text>
  <rect x="890" y="360" width="170" height="75" class="load"/><text x="925" y="406" class="label">Light 1</text>
  <rect x="890" y="475" width="170" height="75" class="load"/><text x="925" y="521" class="label">Light 2</text>
  <rect x="890" y="590" width="170" height="75" class="load"/><text x="925" y="636" class="label">Light 3</text>

  <rect x="1150" y="300" width="170" height="115" class="sensor"/><text x="1198" y="345" class="label">ACS712</text><text x="1184" y="377" class="small">Current sensor</text>

  <path class="signal" d="M350 270 H520"/><path class="signal" d="M350 330 H520"/><path class="signal" d="M350 390 H520"/><path class="signal" d="M350 450 H520"/><path class="signal" d="M350 510 H520"/>
  <path class="wire" d="M750 315 H835 V167 H890"/><path class="wire" d="M750 365 H835 V282 H890"/><path class="wire" d="M750 415 H860 V397 H890"/><path class="wire" d="M750 465 H860 V512 H890"/><path class="wire" d="M750 515 H835 V627 H890"/>
  <path class="power" d="M1060 167 H1150 V330"/><path class="power" d="M1060 282 H1150"/><path class="power" d="M1060 397 H1150"/><path class="power" d="M1060 512 H1150 V385"/><path class="power" d="M1060 627 H1150 V385"/>
  <path class="signal" d="M1150 360 H1080 V585 H350"/>
  <text x="1135" y="258" class="small">load current path</text>
  <text x="430" y="255" class="small">GPIO control signals</text>
  <text x="760" y="120" class="small">Relay contacts switch the external load supply. ESP32 only drives relay inputs.</text>

  <rect x="90" y="720" width="1220" height="80" fill="#f1f5f9" stroke="#cbd5e1" rx="16"/>
  <text x="120" y="754" class="label">Safety note:</text><text x="230" y="754" class="small">For real AC lights/fans, use certified isolated relay modules, fuse protection, proper enclosure, and qualified supervision. This schematic is for hackathon simulation/concept only.</text>
</svg>
